name : Matrix Fail Fast

on: 
  push:
    branches: [main]

jobs: 
  test: 
     strategy: 
       fail-fast: false

       matrix: 
         os: [ubuntu-latest,windows-latest]
         python-version: ["3.10","3.11","3.12"]

         exclude:
          - os: windows-latest
            python-version: "3.10"  
     runs-on: ${{ matrix.os }}     
     steps: 
      - uses: actions/checkout@v3

      - name: Setup Python 
        uses: actions/setup-python@v4
        with: 
           python-version: ${{ matrix.python-version }}

      - name: Print Python Version
        run: python --version

      - name: Force Failure
        run: exit 1