name: Conditionals Demo

on: 
  workflow_dispatch:
  pull_request: 

jobs:
  conditional-jobs:

     runs-on: ubuntu-latest
     # Job runs only on push not PR

     if: github.event_name == 'push'

     steps:
       - name: Run only on main branches
         if: github.ref == 'ref/heads/main'
         run: echo "This runs only on main branch "

  # This step will fail intentionally
  
       - name: Failing Step
         id: fail-step
         run: exit 1
         continue-on-error: true

  #This steps runs only if previous step failed

       - name: Runs if previous steps failed 
         if: failure()
         run: echo "Previous step failed, so I am running yipee"
