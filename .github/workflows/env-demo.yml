name: Environment variable Demo

on:
  push:
    branches: [main]

env:  #workflow level
  APP_NAME: myapp

jobs: 
   test-env-vars: 
      env:  # job level
         Environment: Production
      
      runs-on: ubuntu-latest

      steps:
         - name: Print all Environment variable
           
           env:  # step level
             Version: 1.0.0

           run: |

            echo "Workflow level env:$APP_NAME"
            echo "Job level env: $Environment"
            echo "Step level env: $Version" 
        
