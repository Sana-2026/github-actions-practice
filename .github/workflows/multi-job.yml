name: Multi jobs

on:
  workflow_dispatch:
    
jobs: 
  build:

     runs-on: ubuntu-latest

     steps: 
        - name: Print message
          run: echo "Building the app"


  test:
  
     needs: build
     runs-on: ubuntu-latest

     steps:
        - name: Print test message
          run: echo "Running test"

  
  deploy: 
  
     needs: test 
     runs-on: ubuntu-latest

     steps:
      - name: Print deploy message
        run: echo "Deploying"

