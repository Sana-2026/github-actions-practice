name: Self-Hosted Runner Demo

on:
  workflow_dispatch:

jobs:
  test-self-hosted:
    runs-on: self-hosted

    steps:
      - name: Print hostname
        run: hostname

      - name: Print working directory
        run: pwd

      - name: Create a file
        run: |
          echo "This file was created by GitHub Actions on a self-hosted runner." > self-hosted-proof.txt
          ls -l self-hosted-proof.txt

      - name: Verify file exists
        run: test -f self-hosted-proof.txt && echo "File exists"

