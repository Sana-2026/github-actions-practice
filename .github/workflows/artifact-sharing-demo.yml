
name: Artifact Sharing Demo
on: workflow_dispatch

jobs:
  Job1-create:
    runs-on: ubuntu-latest
    steps: 
      - name: Generate file
        run: |
          echo "Hello Dosto from Job 1" > shared.txt
          echo "Artifact passing Works!" >> shared.txt


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with: 
          name: shared-file
          path: shared.txt


  Job2-use:
     runs-on: ubuntu-latest
     steps:
       - name: Download artifacts
         uses: actions/download-artifact@v4
         with: 
           name: shared-file

       - name: Read File Content    
         run: |
           echo "Reading artifact content :"
           cat shared.txt
