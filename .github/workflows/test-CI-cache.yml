name: Test CI 
on: workflow_dispatch

jobs:
  run-bash-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Give Execute Permissions
        run: chmod +x ./system-info.sh

      - name: Run script
        run: ./system-info.sh

  run-python-script:
     runs-on: ubuntu-latest
     steps:
       - name: Checkout code
         uses : actions/checkout@v4

       - name: Setup python
         uses: actions/setup-python@v5
         with:
           python-version: '3.12'
           cache: 'pip'
       
       - name: Install dependencies
         run: |
          pip install -r requirements.txt || echo "No requirements file"

       - name: Run Python script
         run: python app.py  

       
