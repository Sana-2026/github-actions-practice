name: Jobs Output demo

on:
  workflow_dispatch:


jobs:
  generate-date: 
      runs-on: ubuntu-latest
      outputs:
         current-date: ${{steps.set-date.outputs.today}}


      steps: 
        - name : Set today's Date 
          id: set-date
          run: |
            echo "today=$(date + '%Y-%m-%d')" >> $GITHUB_OUTPUT

  use-date: 
      runs-on: ubuntu-latest
      needs: generate-date

      steps:
        - name : Print date from previous job
          run: |
            echo "Today's date is :${{needs.generate-date.outputs.today}}"

